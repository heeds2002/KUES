<!DOCTYPE html>
<html>
<head>
    <title>Records</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>Kabianga University Examiner System</h1>
    <p>Saved Results</p>
</header>

<div class="container">

    <h2>All Submissions</h2>

    <table border="1" width="100%" cellpadding="10">
        <tr>
            <th>ID</th>
            <th>Filename</th>
            <th>Result</th>
            <th>Date</th>
        </tr>

        {% for row in records %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
